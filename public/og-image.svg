<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#010309"/>
      <stop offset="50%" style="stop-color:#0a1628"/>
      <stop offset="100%" style="stop-color:#010309"/>
    </linearGradient>
    <linearGradient id="text" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#06B6D4"/>
      <stop offset="50%" style="stop-color:#4F46E5"/>
      <stop offset="100%" style="stop-color:#7C3AED"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative elements -->
  <circle cx="100" cy="100" r="150" fill="#06B6D4" opacity="0.1"/>
  <circle cx="1100" cy="530" r="200" fill="#4F46E5" opacity="0.1"/>

  <!-- Logo icon (hexagon) -->
  <path d="M150 280 L180 260 L210 280 L210 320 L180 340 L150 320 Z"
        fill="none" stroke="#06B6D4" stroke-width="3"/>

  <!-- Main text -->
  <text x="600" y="280" font-family="system-ui, -apple-system, sans-serif" font-size="72" font-weight="700" fill="white" text-anchor="middle">NDN Analytics</text>

  <!-- Tagline -->
  <text x="600" y="360" font-family="system-ui, -apple-system, sans-serif" font-size="28" fill="#E8EDF5" opacity="0.7" text-anchor="middle">Enterprise AI &amp; Blockchain Intelligence</text>

  <!-- Subtitle -->
  <text x="600" y="420" font-family="system-ui, -apple-system, sans-serif" font-size="20" fill="url(#text)" text-anchor="middle">10 Products. Two Stacks. Infinite Intelligence.</text>

  <!-- Bottom bar -->
  <rect x="200" y="500" width="800" height="2" fill="url(#text)" rx="1"/>

  <!-- URL -->
  <text x="600" y="550" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="#E8EDF5" opacity="0.5" text-anchor="middle">www.ndnanalytics.com</text>
</svg>