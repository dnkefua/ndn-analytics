# Firebase App Hosting Configuration
# Target Firebase Project: ndn-analytics-academy

runConfig:
  minInstances: 0
  maxInstances: 10
  concurrency: 80
  cpu: 1
  memoryMiB: 512

scripts:
  buildCommand: npm run build
  runCommand: npm run start

env:
  - variable: NODE_ENV
    value: production
  - variable: PORT
    value: "8080"
