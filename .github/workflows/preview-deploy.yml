name: Preview Deploy (PR)

on:
  pull_request:
    branches: [main]

jobs:
  preview:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Lint Cloud Functions
        run: cd functions && npm ci && npx eslint .

      - name: Type check
        run: npx tsc --noEmit

      - name: Unit & integration tests
        run: npm run test:coverage

      - name: Build
        run: npm run build
        env:
          VITE_ANTHROPIC_API_KEY: ${{ secrets.VITE_ANTHROPIC_API_KEY }}
          VITE_EMAILJS_SERVICE_ID: ${{ secrets.VITE_EMAILJS_SERVICE_ID }}
          VITE_EMAILJS_TEMPLATE_ID: ${{ secrets.VITE_EMAILJS_TEMPLATE_ID }}
          VITE_EMAILJS_PUBLIC_KEY: ${{ secrets.VITE_EMAILJS_PUBLIC_KEY }}
          VITE_GA_ID: ${{ secrets.VITE_GA_ID }}

      - name: Lighthouse CI
        run: |
          npm install -g @lhci/cli
          lhci autorun

      - name: E2E tests
        run: |
          npx playwright install --with-deps chromium
          npx playwright test

      - name: Deploy preview channel
        run: |
          npx firebase-tools hosting:channel:deploy pr-${{ github.event.pull_request.number }} \
            --project ndn-analytics \
            --token ${{ secrets.FIREBASE_TOKEN }} \
            --expires 7d
