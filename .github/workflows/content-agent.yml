name: NDN Content Agent

# Self-sustaining blog pipeline. Every Monday this runs Claude in CI to check
# whether the scheduled-post buffer is running low and, if so, research and
# write 10 new posts (news + evergreen), download hero images, regenerate the
# sitemaps/feed/news-sitemap, validate, commit, push, and trigger a deploy.
#
# Required repo secret (Settings -> Secrets and variables -> Actions):
#   ANTHROPIC_API_KEY  - an Anthropic API key from https://console.anthropic.com
#
# Reuses the existing FIREBASE_TOKEN secret via the Deploy workflow it triggers.

on:
  schedule:
    - cron: '0 9 * * 1'        # Mondays 09:00 UTC
  workflow_dispatch: {}          # manual "Run workflow" button

permissions:
  contents: write                # commit + push the new batch
  actions: write                 # trigger the deploy workflow

concurrency:
  group: content-agent
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Run Content Agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          claude --print \
            --permission-mode bypassPermissions \
            --allowedTools "Bash Read Write Edit Glob Grep WebSearch WebFetch" \
            --max-turns 200 \
            "$(cat .github/content-agent-prompt.md)"

      - name: Validate (block bad content from reaching main)
        run: |
          npm run lint
          npx tsc -b

      - name: Commit, push, and trigger deploy
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name  "NDN Content Agent"
          git config user.email "content-agent@ndnanalytics.com"
          if [ -z "$(git status --porcelain)" ]; then
            echo "No changes this week — buffer sufficient. Nothing to deploy."
            exit 0
          fi
          git add -A
          git commit -m "feat: scheduled blog batch (NDN Content Agent)

          Auto-generated weekly by the NDN Content Agent workflow.

          Co-Authored-By: Claude <noreply@anthropic.com>"
          git push origin main
          echo "Pushed new content. Triggering deploy pipeline..."
          gh workflow run "Deploy to Firebase Hosting" --ref main
