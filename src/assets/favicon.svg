<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background -->
  <rect width="32" height="32" rx="3" fill="#010308"/>

  <!-- N (left) — left bar + diagonal + right bar -->
  <rect x="1"   y="6" width="2.5" height="20" fill="#00d4ff"/>
  <polygon points="3.5,6 5.5,6 8.5,23.5 6.5,23.5" fill="#00d4ff"/>
  <rect x="8.5" y="6" width="2.5" height="20" fill="#00d4ff"/>

  <!-- D — left bar + clockwise arc bulging right -->
  <path d="M12,6 L14.5,6 A6,10 0 0 1 14.5,26 L12,26 Z" fill="#00d4ff"/>

  <!-- N (right) — same as left N, shifted -->
  <rect x="21.5" y="6" width="2.5" height="20" fill="#00d4ff"/>
  <polygon points="24,6 26,6 29,23.5 27,23.5" fill="#00d4ff"/>
  <rect x="29"   y="6" width="2.5" height="20" fill="#00d4ff"/>
</svg>
